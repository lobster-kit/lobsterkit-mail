name: Publish MCP

on:
  push:
    tags: ['mcp-v*']

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    runs-on: ubuntu-latest
    needs: ci
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Publish to npm
        run: cd packages/mcp && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#mcp-v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "@lobsterkit/lobstermail-mcp@${VERSION}" \
            --notes "## Install

          \`\`\`bash
          npx @lobsterkit/lobstermail-mcp@${VERSION}
          \`\`\`

          ## MCP Config

          \`\`\`json
          {
            \"mcpServers\": {
              \"lobstermail\": {
                \"command\": \"npx\",
                \"args\": [\"-y\", \"@lobsterkit/lobstermail-mcp@${VERSION}\"]
              }
            }
          }
          \`\`\`"
