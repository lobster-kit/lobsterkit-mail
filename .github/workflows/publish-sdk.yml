name: Publish SDK

on:
  push:
    tags: ['sdk-v*']

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  publish:
    runs-on: ubuntu-latest
    needs: ci
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @lobsterkit/lobstermail build
      - run: pnpm --filter @lobsterkit/lobstermail test
      - name: Publish to npm
        run: cd packages/sdk && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#sdk-v}"
          gh release create "$GITHUB_REF_NAME" \
            --title "@lobsterkit/lobstermail@${VERSION}" \
            --notes "## Install

          \`\`\`bash
          npm install @lobsterkit/lobstermail@${VERSION}
          \`\`\`"
